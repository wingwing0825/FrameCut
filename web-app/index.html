<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameCut</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-badge">FrameCut Web</div>
      <h1 id="title">FrameCut</h1>
      <p id="subtitle">Video frame extractor</p>
    </header>

    <section class="card">
      <h2 id="step1Title">Step 1</h2>
      <div class="file-top-row">
        <label id="chooseVideoBtn" class="choose-btn" for="videoInput">Choose video</label>
        <span class="format-tag">mp4 / mov / mkv / avi / webm / flv / wmv</span>
      </div>

      <input id="videoInput" class="hidden-input" type="file" accept="video/*" />

      <label id="dropZone" class="drop-zone" for="videoInput">
        <span id="dropZoneText">Drop video here or click to choose</span>
      </label>
      <p id="videoMeta" class="meta">No video selected.</p>
    </section>

    <section class="card">
      <h2 id="step2Title">Step 2</h2>

      <div class="grid">
        <label>
          <span id="formatLabel">Image format</span>
          <select id="formatSelect">
            <option id="optionPng" value="png">PNG</option>
            <option id="optionJpg" value="jpg">JPG</option>
            <option id="optionWebp" value="webp">WEBP</option>
          </select>
        </label>

        <label>
          <span id="perSecondLabel">Images per second</span>
          <input id="perSecondInput" type="number" min="1" max="60" step="1" value="1" />
        </label>
      </div>

      <div class="rate-box">
        <input id="perSecondSlider" type="range" min="1" max="60" step="1" value="1" />
        <div class="preset-row">
          <button id="preset1" type="button" class="fps-preset" data-fps="1">1 / sec</button>
          <button id="preset5" type="button" class="fps-preset" data-fps="5">5 / sec</button>
          <button id="preset10" type="button" class="fps-preset" data-fps="10">10 / sec</button>
          <button id="preset24" type="button" class="fps-preset" data-fps="24">24 / sec</button>
        </div>
      </div>

      <label class="inline-check">
        <input id="allFramesCheck" type="checkbox" />
        <span id="allFramesLabel">Export every frame</span>
      </label>

      <fieldset class="mode-box">
        <legend id="outputModeTitle">Output mode</legend>

        <label class="mode-item mode-item-strong">
          <input type="radio" name="outputMode" value="zip" checked />
          <span id="zipModeLabel">Download ZIP</span>
        </label>

        <label class="mode-item mode-item-strong">
          <input type="radio" name="outputMode" value="folder" />
          <span id="folderModeLabel">Write to folder (Chrome / Edge)</span>
        </label>

        <div class="folder-row">
          <button id="pickFolderBtn" type="button" disabled>Choose output folder</button>
          <span id="folderName">No folder selected.</span>
        </div>
      </fieldset>
    </section>

    <section class="card">
      <h2 id="step3Title">Step 3</h2>
      <div class="actions">
        <button id="convertBtn" type="button">Convert</button>
        <button id="downloadBtn" type="button" disabled>Download</button>
        <button id="clearBtn" type="button">Clear Log</button>
      </div>

      <progress id="progressBar" max="100" value="0"></progress>
      <p id="statusText">Ready</p>
      <textarea id="logBox" readonly></textarea>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
